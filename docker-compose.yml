version: '3.8'

services:
  fupaw-poc:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fupaw-poc
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-qwen2:0.5b}
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    command: npm run dev
