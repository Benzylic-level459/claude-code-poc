version: '3.8'

services:
  claude-code-poc:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: claude-code-poc
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-3-opus-20240229}
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    command: npm run dev
